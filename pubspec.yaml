name: kiru
description: AI-Powered Travel Outfit Recommender & Virtual Wardrobe
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_analytics: ^11.3.0
  firebase_messaging: ^15.1.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.2

  # HTTP & APIs
  dio: ^5.6.0
  google_generative_ai: ^0.4.6

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI Utilities
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_card_swiper: ^7.0.2

  # ML Kit (optional, Phase 1+)
  google_mlkit_image_labeling: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
